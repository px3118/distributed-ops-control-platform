services:
  postgres:
    image: postgres:16-alpine
    container_name: ops_platform_postgres
    environment:
      POSTGRES_USER: ops
      POSTGRES_PASSWORD: ops
      POSTGRES_DB: ops_control
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ops -d ops_control"]
      interval: 5s
      timeout: 3s
      retries: 15

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ops_platform_api
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://ops:ops@postgres:5432/ops_control
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ops_platform_web
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:4000/api/v1
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
